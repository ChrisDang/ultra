version: 2

project_name: vibecloud

before:
  hooks:
    - cd cli && go mod tidy

builds:
  - dir: cli
    main: ./main.go
    binary: vibecloud
    tool: garble
    env:
      - CGO_ENABLED=0
      - GOFLAGS=-buildvcs=false
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "vibecloud_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  prerelease: auto
